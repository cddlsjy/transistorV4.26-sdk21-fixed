name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'

      - name: Build APK
        id: build
        run: |
          gradle assembleDebug --stacktrace --no-daemon \
          -Dorg.gradle.java.home=$JAVA_HOME 2>&1 | tee build.log

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

  # 修复点：修改了这里的 if 条件，改为正确的依赖关系
  upload-apk:
    needs: build # 依赖 build 任务
    # if: needs.build.result == 'success' <-- 删除这行，它是错的
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 7
