name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'

      - name: Build APK
        id: build
        run: |
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log
        continue-on-error: true

      # 仅在编译失败时上传日志
      - name: Upload error log
        if: failure() || steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build.log
          retention-days: 7

      # 仅在编译成功时查找并上传 APK
      - name: Find APK
        if: steps.build.outcome == 'success'
        id: find_apk
        run: |
          echo "Searching for APK files..."
          APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found. Listing build outputs for debugging:"
            find . -path "*/build/outputs/*" -type f | head -20
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 7