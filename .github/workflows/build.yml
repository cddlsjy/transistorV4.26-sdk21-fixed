- name: Find APK
  id: find_apk
  run: |
    APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
    if [ -z "$APK_PATH" ]; then
      echo "No APK found"
      exit 1
    fi
    echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

- name: Upload APK
  uses: actions/upload-artifact@v4
  with:
    name: app-debug-apk
    path: ${{ steps.find_apk.outputs.apk_path }}
    retention-days: 7
