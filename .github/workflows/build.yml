name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 关键修复: 给gradlew脚本添加可执行权限
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        id: build
        run: |
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log
        continue-on-error: true

      - name: Upload error log
        if: failure() || steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build.log
          retention-days: 7

      # 使用通配符查找APK，路径更通用
      - name: Find APK
        if: steps.build.outcome == 'success'
        id: find_apk
        run: |
          APK_PATH=$(find . -path "*/build/outputs/apk/*/*.apk" -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 7